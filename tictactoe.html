<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(90deg, #ff6b6b 0%, #ff6b6b 50%, #4ecdc4 50%, #4ecdc4 100%);
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .title {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .turn {
            font-size: 22px;
            font-weight: 600;
            color: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
            min-height: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 8px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            border: none;
            border-radius: 10px;
            font-size: 64px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }
        .cell:hover:not(.occupied) {
            background: linear-gradient(135deg, #f0f0f0 0%, #e8e8ff 100%);
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4), 0 6px 16px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(102, 126, 234, 0.3);
        }
        .cell.occupied {
            cursor: not-allowed;
        }
        .cell.winner-x {
            background-color: #ff6b6b;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .cell.winner-o {
            background-color: #4ecdc4;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .restart-btn {
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 600;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }
        .restart-btn:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 107, 0.6);
        }
        .restart-btn:active {
            transform: translateY(0);
        }
        .score-board {
            display: flex;
            gap: 50px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .score-label {
            font-size: 16px;
            opacity: 0.9;
        }
        .score-value {
            font-size: 32px;
            font-weight: bold;
        }
        @keyframes celebrate {
            0% {
                transform: scale(1);
                font-size: 22px;
            }
            50% {
                transform: scale(1.3);
                font-size: 28px;
            }
            100% {
                transform: scale(1.2);
                font-size: 26px;
            }
        }
        @keyframes bgFlashRed {
            0% {
                background: linear-gradient(90deg, #ff6b6b 0%, #ff6b6b 50%, #4ecdc4 50%, #4ecdc4 100%);
            }
            50% {
                background: linear-gradient(90deg, #ff4444 0%, #ff4444 50%, #4ecdc4 50%, #4ecdc4 100%);
            }
            100% {
                background: linear-gradient(90deg, #ff6b6b 0%, #ff6b6b 50%, #4ecdc4 50%, #4ecdc4 100%);
            }
        }
        @keyframes bgFlashBlue {
            0% {
                background: linear-gradient(90deg, #ff6b6b 0%, #ff6b6b 50%, #4ecdc4 50%, #4ecdc4 100%);
            }
            50% {
                background: linear-gradient(90deg, #ff6b6b 0%, #ff6b6b 50%, #2ba39f 50%, #2ba39f 100%);
            }
            100% {
                background: linear-gradient(90deg, #ff6b6b 0%, #ff6b6b 50%, #4ecdc4 50%, #4ecdc4 100%);
            }
        }
        .turn.celebrate {
            animation: celebrate 0.6s ease-in-out;
            animation-iteration-count: 2;
            font-size: 28px;
        }
        .turn.celebrate-x {
            color: #ff6b6b;
        }
        .turn.celebrate-o {
            color: #4ecdc4;
        }
        body.celebration-x {
            animation: bgFlashRed 1.2s ease-in-out;
        }
        body.celebration-o {
            animation: bgFlashBlue 1.2s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Tic-Tac-Toe</h1>
        <div class="score-board">
            <div class="score-item">
                <span class="score-label">X Wins</span>
                <span class="score-value" id="scoreX">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">O Wins</span>
                <span class="score-value" id="scoreO">0</span>
            </div>
        </div>
        <div class="turn" id="turn">Player X's turn</div>
        <div class="grid" id="grid">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
        </div>
        <button class="restart-btn" id="restartBtn">Restart Game</button>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const turnDisplay = document.getElementById('turn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreXDisplay = document.getElementById('scoreX');
        const scoreODisplay = document.getElementById('scoreO');
        const body = document.body;
        let currentPlayer = 'X';
        let gameOver = false;
        let scoreX = 0;
        let scoreO = 0;

        function checkWin(player) {
            const wins = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
                [0, 4, 8], [2, 4, 6] // diagonals
            ];
            const winCombo = wins.find(combo => combo.every(index => cells[index].textContent === player));
            return winCombo || null;
        }

        function highlightWinningCells(combo, player) {
            const className = player === 'X' ? 'winner-x' : 'winner-o';
            combo.forEach(index => {
                cells[index].classList.add(className);
            });
        }

        function checkDraw() {
            return Array.from(cells).every(cell => cell.textContent !== '');
        }

        function resetGame() {
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('occupied', 'winner-x', 'winner-o');
            });
            currentPlayer = 'X';
            gameOver = false;
            turnDisplay.classList.remove('celebrate', 'celebrate-x', 'celebrate-o');
            body.classList.remove('celebration-x', 'celebration-o');
            turnDisplay.textContent = `Player X's turn`;
        }

        function updateScore() {
            scoreXDisplay.textContent = scoreX;
            scoreODisplay.textContent = scoreO;
        }

        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                if (!gameOver && cell.textContent === '') {
                    cell.textContent = currentPlayer;
                    cell.classList.add('occupied');
                    const winCombo = checkWin(currentPlayer);
                    if (winCombo) {
                        highlightWinningCells(winCombo, currentPlayer);
                        if (currentPlayer === 'X') {
                            scoreX++;
                            turnDisplay.classList.add('celebrate', 'celebrate-x');
                            body.classList.add('celebration-x');
                        } else {
                            scoreO++;
                            turnDisplay.classList.add('celebrate', 'celebrate-o');
                            body.classList.add('celebration-o');
                        }
                        updateScore();
                        turnDisplay.textContent = `Player ${currentPlayer} wins!`;
                        gameOver = true;
                    } else if (checkDraw()) {
                        turnDisplay.textContent = `It's a draw!`;
                        gameOver = true;
                    } else {
                        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                        turnDisplay.textContent = `Player ${currentPlayer}'s turn`;
                    }
                }
            });
        });

        restartBtn.addEventListener('click', resetGame);
    </script>
</body>
</html>
